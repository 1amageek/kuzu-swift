name: Release XCFramework

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for manual release'
        required: false
        type: string

jobs:
  build-xcframework:
    runs-on: macos-14
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Install xcpretty
      run: gem install xcpretty
        
    - name: Build XCFramework
      run: |
        chmod +x Scripts/build-xcframework.sh
        ./Scripts/build-xcframework.sh Kuzu
        
    - name: Prepare release assets
      id: prepare
      run: |
        # Get tag name
        if [ "${{ github.event_name }}" = "push" ]; then
          TAG_NAME="${GITHUB_REF#refs/tags/}"
        else
          TAG_NAME="${{ github.event.inputs.tag_name || 'manual' }}"
        fi
        
        # Calculate checksum
        CHECKSUM=$(swift package compute-checksum build/Kuzu.xcframework.zip)
        echo "checksum=${CHECKSUM}" >> $GITHUB_OUTPUT
        echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
        
        # Display info
        echo "Tag: ${TAG_NAME}"
        echo "Checksum: ${CHECKSUM}"
        echo "Framework size: $(du -sh build/Kuzu.xcframework | cut -f1)"
        echo "Zip size: $(du -sh build/Kuzu.xcframework.zip | cut -f1)"
        
    - name: Create Release and Upload XCFramework
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.prepare.outputs.tag_name }}
        name: ${{ steps.prepare.outputs.tag_name }} - XCFramework Release
        draft: false
        prerelease: false
        files: |
          build/Kuzu.xcframework.zip
        body: |
          ## 📦 XCFramework Release
          
          This release includes pre-built XCFramework for faster builds.
          
          ### Installation
          
          ```swift
          dependencies: [
              .package(url: "https://github.com/1amageek/kuzu-swift", exact: "${{ steps.prepare.outputs.tag_name }}")
          ]
          ```
          
          ### Binary Target Configuration
          
          ```swift
          .binaryTarget(
              name: "Kuzu",
              url: "https://github.com/1amageek/kuzu-swift/releases/download/${{ steps.prepare.outputs.tag_name }}/Kuzu.xcframework.zip",
              checksum: "${{ steps.prepare.outputs.checksum }}"
          )
          ```
          
          ### Supported Platforms
          - iOS (arm64)
          - iOS Simulator (arm64)
          - macOS (arm64)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload artifacts (manual trigger)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: kuzu-xcframework
        path: |
          build/Kuzu.xcframework.zip
          Package.swift
        retention-days: 7
        
    - name: Display usage instructions
      run: |
        echo "## 📦 XCFramework Release Info"
        echo ""
        echo "### Binary Package.swift Usage:"
        echo "\`\`\`swift"
        echo ".binaryTarget("
        echo "    name: \"Kuzu\","
        echo "    url: \"https://github.com/1amageek/kuzu-swift/releases/download/${{ steps.prepare.outputs.tag_name }}/Kuzu.xcframework.zip\","
        echo "    checksum: \"${{ steps.prepare.outputs.checksum }}\""
        echo ")"
        echo "\`\`\`"
        echo ""
        echo "### SPM Dependency:"
        echo "\`\`\`swift"
        echo ".package(url: \"https://github.com/1amageek/kuzu-swift.git\", exact: \"${{ steps.prepare.outputs.tag_name }}\")"
        echo "\`\`\`"